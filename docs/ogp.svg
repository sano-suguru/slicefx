  <circle cx="92" cy="504" r="4" fill="#60a5fa"/>
  <text x="106" y="509" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Source-generated</text>

  <rect x="284" y="490" width="176" height="28" rx="14" fill="rgba(15,23,42,0.72)" stroke="rgba(51,65,85,0.9)" stroke-width="1"/>
  <circle cx="304" cy="504" r="4" fill="#34d399"/>
  <text x="318" y="509" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Zero reflection</text>

  <rect x="472" y="490" width="170" height="28" rx="14" fill="rgba(15,23,42,0.72)" stroke="rgba(51,65,85,0.9)" stroke-width="1"/>
  <circle cx="492" cy="504" r="4" fill="#22d3ee"/>
  <text x="506" y="509" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Zero NuGet deps</text>

