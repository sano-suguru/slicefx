  <rect x="72" y="158" width="330" height="32" rx="16" fill="rgba(30,58,138,0.4)" stroke="rgba(59,130,246,0.28)" stroke-width="1"/>
  <circle cx="96" cy="174" r="5" fill="#34d399"/>
  <text x="112" y="179" font-family="Courier New, monospace" font-size="13" fill="#60a5fa">Feature-first .NET APIs</text>

