  <text x="98" y="105" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="white">S</text>

  <!-- Brand + badge -->
  <text x="138" y="105" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="white">Slice</text>
  <rect x="248" y="82" width="136" height="28" rx="14" fill="rgba(30,58,138,0.55)" stroke="rgba(59,130,246,0.32)" stroke-width="1"/>
  <text x="316" y="101" font-family="Courier New, monospace" font-size="13" text-anchor="middle" fill="#93c5fd">experimental</text>

