  <rect x="680" y="140" width="480" height="44" rx="14" fill="#1e293b"/>
  <rect x="680" y="168" width="480" height="16" fill="#1e293b"/>
  <circle cx="708" cy="162" r="6" fill="rgba(239,68,68,0.75)"/>
  <circle cx="730" cy="162" r="6" fill="rgba(234,179,8,0.75)"/>
  <circle cx="752" cy="162" r="6" fill="rgba(34,197,94,0.75)"/>
  <text x="855" y="167" font-family="Courier New, monospace" font-size="12" text-anchor="middle" fill="#64748b">CreateUser.cs</text>

  <!-- Code lines -->
  <text x="706" y="210" font-family="Courier New, monospace" font-size="13.5" fill="#c084fc">[Feature(</text>
  <text x="792" y="210" font-family="Courier New, monospace" font-size="13.5" fill="#fbbf24">"POST /users"</text>
  <text x="902" y="210" font-family="Courier New, monospace" font-size="13.5" fill="#c084fc">)]</text>

  <text x="706" y="234" font-family="Courier New, monospace" font-size="13.5" fill="#60a5fa">public static class </text>
  <text x="861" y="234" font-family="Courier New, monospace" font-size="13.5" fill="#6ee7b7">CreateUser</text>

  <text x="706" y="258" font-family="Courier New, monospace" font-size="13.5" fill="#f8fafc">{</text>

  <text x="724" y="284" font-family="Courier New, monospace" font-size="13.5" fill="#60a5fa">public record </text>
  <text x="824" y="284" font-family="Courier New, monospace" font-size="13.5" fill="#6ee7b7">Request</text>
  <text x="874" y="284" font-family="Courier New, monospace" font-size="13.5" fill="#94a3b8">(...)</text>

  <text x="724" y="308" font-family="Courier New, monospace" font-size="13.5" fill="#60a5fa">public record </text>
  <text x="824" y="308" font-family="Courier New, monospace" font-size="13.5" fill="#6ee7b7">Response</text>
  <text x="880" y="308" font-family="Courier New, monospace" font-size="13.5" fill="#94a3b8">(...)</text>

  <text x="724" y="344" font-family="Courier New, monospace" font-size="13.5" fill="#60a5fa">public static async </text>
  <text x="868" y="344" font-family="Courier New, monospace" font-size="13.5" fill="#67e8f9">Task</text>
  <text x="895" y="344" font-family="Courier New, monospace" font-size="13.5" fill="#f8fafc">&lt;</text>
  <text x="902" y="344" font-family="Courier New, monospace" font-size="13.5" fill="#6ee7b7">Response</text>
  <text x="958" y="344" font-family="Courier New, monospace" font-size="13.5" fill="#f8fafc">&gt;</text>

  <text x="724" y="368" font-family="Courier New, monospace" font-size="13.5" fill="#6ee7b7">Handle</text>
  <text x="772" y="368" font-family="Courier New, monospace" font-size="13.5" fill="#f8fafc">(</text>
  <text x="779" y="368" font-family="Courier New, monospace" font-size="13.5" fill="#6ee7b7">Request</text>
  <text x="827" y="368" font-family="Courier New, monospace" font-size="13.5" fill="#94a3b8"> req, ...)</text>

  <text x="724" y="404" font-family="Courier New, monospace" font-size="13.5" fill="#f8fafc">=&gt; store.AddAsync(req, ct);</text>

  <text x="706" y="432" font-family="Courier New, monospace" font-size="13.5" fill="#f8fafc">}</text>

  <!-- Footer -->
  <line x1="72" y1="582" x2="1128" y2="582" stroke="rgba(51,65,85,0.45)" stroke-width="1"/>
