name: Perf (nightly)

on:
  pull_request:
    paths:
      - '.github/workflows/perf.yml'
      - 'Directory.Build.props'
      - 'global.json'
      - 'src/SliceFx.Core/**'
      - 'src/SliceFx.SourceGenerator/**'
      - 'tests/SliceFx.Benchmarks/**'
      - 'tests/SliceFx.Benchmarks.Runtime/**'
      - 'tests/SliceFx.Benchmarks.RuntimeApps/**'
  schedule:
    # 02:00 UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: perf
  cancel-in-progress: false

jobs:
  benchmark:
    name: Source Generator benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install chart dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib==3.9.2

      - name: Restore
        run: dotnet restore tests/SliceFx.Benchmarks/SliceFx.Benchmarks.csproj

      - name: Build benchmarks (Release)
        run: dotnet build tests/SliceFx.Benchmarks/SliceFx.Benchmarks.csproj --configuration Release --no-restore

      - name: Run benchmarks
        run: dotnet run -c Release --project tests/SliceFx.Benchmarks --no-build -- --filter '*'

      - name: Capture chart metadata
        id: chart-meta
        run: |
          echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          echo "measured_at=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Generate benchmark chart
        run: >
          python tests/SliceFx.Benchmarks/render-perf-chart.py
          --results-dir BenchmarkDotNet.Artifacts/results
          --gates tests/SliceFx.Benchmarks/gates.json
          --output docs/perf/latest.svg
          --history-dir docs/perf/history
          --run-date "${{ steps.chart-meta.outputs.date }}"
          --measured-at "${{ steps.chart-meta.outputs.measured_at }}"
          --commit-sha "${{ steps.chart-meta.outputs.short_sha }}"

      - name: Upload BenchmarkDotNet artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            BenchmarkDotNet.Artifacts/
            docs/perf/latest.svg
            docs/perf/history/${{ steps.chart-meta.outputs.date }}.svg
          if-no-files-found: warn

      - name: Check perf gates
        run: bash tests/SliceFx.Benchmarks/check-gates.sh tests/SliceFx.Benchmarks/gates.json BenchmarkDotNet.Artifacts/results

      - name: Detect chart changes
        id: chart-changes
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "$(git status --porcelain -- docs/perf)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit benchmark chart
        if: github.ref == 'refs/heads/main' && steps.chart-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/perf/latest.svg "docs/perf/history/${{ steps.chart-meta.outputs.date }}.svg"
          git commit -m "chore(perf): update benchmark chart ${{ steps.chart-meta.outputs.date }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Publish benchmark chart
        if: github.ref == 'refs/heads/main' && steps.chart-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main

  runtime-benchmark:
    name: Runtime benchmarks
    runs-on: ubuntu-latest
    needs: benchmark

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Verify bench fixtures are up to date
        run: |
          python3 tools/gen-bench-features.py
          git diff --exit-code tests/SliceFx.Benchmarks.RuntimeApps/

      - name: Restore
        run: dotnet restore tests/SliceFx.Benchmarks.Runtime/SliceFx.Benchmarks.Runtime.csproj

      - name: Build benchmarks (Release)
        run: dotnet build tests/SliceFx.Benchmarks.Runtime/SliceFx.Benchmarks.Runtime.csproj --configuration Release --no-restore

      - name: Run benchmarks
        run: dotnet run -c Release --project tests/SliceFx.Benchmarks.Runtime --no-build -- --filter '*' --artifacts BenchmarkDotNet.Artifacts.Runtime

      - name: Upload BenchmarkDotNet artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-benchmark-results
          path: BenchmarkDotNet.Artifacts.Runtime/
          if-no-files-found: warn

      - name: Check runtime perf gates
        run: bash tests/SliceFx.Benchmarks/check-gates.sh tests/SliceFx.Benchmarks.Runtime/runtime-gates.json BenchmarkDotNet.Artifacts.Runtime/results

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install chart dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib==3.9.2

      - name: Capture runtime chart metadata
        id: runtime-chart-meta
        run: |
          echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          echo "measured_at=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Generate runtime benchmark chart
        run: >
          python tests/SliceFx.Benchmarks/render-runtime-chart.py
          --results-dir BenchmarkDotNet.Artifacts.Runtime/results
          --gates tests/SliceFx.Benchmarks.Runtime/runtime-gates.json
          --output docs/perf/runtime-latest.svg
          --history-dir docs/perf/runtime-history
          --run-date "${{ steps.runtime-chart-meta.outputs.date }}"
          --measured-at "${{ steps.runtime-chart-meta.outputs.measured_at }}"
          --commit-sha "${{ steps.runtime-chart-meta.outputs.short_sha }}"

      - name: Upload runtime chart artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-chart
          path: |
            docs/perf/runtime-latest.svg
            docs/perf/runtime-history/${{ steps.runtime-chart-meta.outputs.date }}.svg
          if-no-files-found: warn

      - name: Detect runtime chart changes
        id: runtime-chart-changes
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "$(git status --porcelain -- docs/perf)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit runtime benchmark chart
        if: github.ref == 'refs/heads/main' && steps.runtime-chart-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/perf/runtime-latest.svg "docs/perf/runtime-history/${{ steps.runtime-chart-meta.outputs.date }}.svg"
          git commit -m "chore(perf): update runtime benchmark chart ${{ steps.runtime-chart-meta.outputs.date }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Publish runtime benchmark chart
        if: github.ref == 'refs/heads/main' && steps.runtime-chart-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
