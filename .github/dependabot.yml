version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    # Microsoft.CodeAnalysis.CSharp sets the minimum Roslyn version that
    # SliceFx.SourceGenerator's consumers must provide. Keep it low; ignore
    # minor/patch bumps. Raise the floor manually only when intentionally
    # dropping support for older SDKs (major bumps still surface).
    ignore:
      - dependency-name: "Microsoft.CodeAnalysis.CSharp"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Pinned tsc used by TS client type-check tests
  - package-ecosystem: npm
    directory: /eng/typescript-typecheck
    schedule:
      interval: weekly

  # WASI sample: jco / preview2-shim / wrangler (upstream unstable toolchain — review bumps carefully)
  - package-ecosystem: npm
    directory: /samples/SliceFx.WasiSample/dist
    schedule:
      interval: weekly
